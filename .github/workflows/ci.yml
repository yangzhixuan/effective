name: Haskell CI

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "master"

jobs:
  build:
    name: ghc ${{ matrix.ghc }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Partial versions resolve to the latest point release known to
        # haskell-actions/setup, so each series tracks its newest patch level.
        ghc: ["9.2", "9.4", "9.6", "9.8", "9.10", "9.12", "9.14"]

    steps:
    - uses: actions/checkout@v6

    - uses: haskell-actions/setup@v2
      name: Setup Haskell
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: ${{ matrix.cabal }}

    - uses: actions/cache@v5
      name: Cache ~/.cabal/packages
      with:
        path: ~/.cabal/packages
        key: ${{ runner.os }}-${{ matrix.ghc }}-cabal-packages
    - uses: actions/cache@v5
      name: Cache ~/.cabal/store
      with:
        path: ~/.cabal/store
        key: ${{ runner.os }}-${{ matrix.ghc }}-cabal-store
    - uses: actions/cache@v5
      name: Cache dist-newstyle
      with:
        path: dist-newstyle
        key: ${{ runner.os }}-${{ matrix.ghc }}-effective-dist

    - name: Install dependencies
      run: |
        cabal update
        cabal configure --project-file=cabal.project.ci --enable-benchmarks --enable-tests --write-ghc-environment-files=always -j2
        cabal build     --project-file=cabal.project.ci --only-dependencies all

    - name: Build & test
      run: |
        cabal build   --project-file=cabal.project.ci
        cabal haddock --project-file=cabal.project.ci
        cabal sdist   --project-file=cabal.project.ci
        cabal check
